<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hitin Banga — Web Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  background: #0C0C0C;
}

body {
  font-family: 'Kanit', sans-serif;
  background: #0C0C0C;
  color: #D7E2EA;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ============================================================
   PRELOADER
   ============================================================ */
#preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0C0C0C;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.5s ease, visibility 0.5s;
}
.loader-content {
  text-align: center;
}
.loader-logo {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 0.2em;
  color: #D7E2EA;
  margin-bottom: 1rem;
  text-transform: uppercase;
}
.loader-bar {
  width: 150px;
  height: 2px;
  background: rgba(215, 226, 234, 0.1);
  position: relative;
  overflow: hidden;
  margin: 0 auto;
}
.loader-progress {
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: #B600A8;
  animation: loading 1.5s infinite;
}
@keyframes loading {
  0% { left: -100%; }
  100% { left: 100%; }
}

/* ============================================================
   SCROLL PROGRESS BAR
   ============================================================ */
#scroll-progress {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 3px;
  background: #B600A8;
  z-index: 1000;
  transition: width 0.1s ease;
}

/* ============================================================
   GRADIENT HEADING CLASS
   ============================================================ */
.hero-heading {
  background: linear-gradient(180deg, #646973 0%, #BBCCD7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ============================================================
   CURSOR
   ============================================================ */
.cursor {
  position: fixed;
  width: 10px;
  height: 10px;
  background: #B600A8;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s;
  mix-blend-mode: screen;
}
.cursor-ring {
  position: fixed;
  width: 36px;
  height: 36px;
  border: 1.5px solid rgba(182, 0, 168, 0.35);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s;
}

/* ============================================================
   NAVBAR
   ============================================================ */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.3rem 5%;
  background: rgba(12, 12, 12, 0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(215, 226, 234, 0.07);
  gap: 1rem;
}

.nav-logo {
  font-size: 1.25rem;
  font-weight: 900;
  color: #D7E2EA;
  text-decoration: none;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}

.nav-links a {
  font-size: 0.82rem;
  color: #D7E2EA;
  text-decoration: none;
  font-weight: 500;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  opacity: 0.65;
  transition: opacity 0.2s;
}

.nav-links a:hover {
  opacity: 1;
}

/* ============================================================
   CURRENCY SELECTOR
   ============================================================ */
.nav-right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.currency-selector {
  position: relative;
}

.currency-btn {
  background: rgba(215, 226, 234, 0.06);
  border: 1px solid rgba(215, 226, 234, 0.14);
  border-radius: 100px;
  padding: 0.52rem 1rem 0.52rem 0.9rem;
  color: #D7E2EA;
  font-family: 'Kanit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.38rem;
  transition: background 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.currency-btn:hover {
  background: rgba(215, 226, 234, 0.1);
  border-color: rgba(215, 226, 234, 0.25);
}

.currency-btn svg {
  transition: transform 0.2s;
  opacity: 0.55;
  flex-shrink: 0;
}

.currency-selector.open .currency-btn svg {
  transform: rotate(180deg);
}

.rate-badge {
  background: rgba(182, 0, 168, 0.18);
  border: 1px solid rgba(182, 0, 168, 0.3);
  border-radius: 100px;
  padding: 0.1rem 0.45rem;
  font-size: 0.6rem;
  font-weight: 600;
  color: #D478CF;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 0.2rem;
}

.currency-dropdown {
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  background: #161616;
  border: 1px solid rgba(215, 226, 234, 0.1);
  border-radius: 18px;
  padding: 0.6rem;
  min-width: 210px;
  z-index: 1000;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  opacity: 0;
  transform: translateY(-8px) scale(0.97);
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.currency-selector.open .currency-dropdown {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: all;
}

.currency-dropdown-header {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(215, 226, 234, 0.3);
  padding: 0.2rem 0.8rem 0.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  display: inline-block;
  animation: pulse-green 2s infinite;
}

@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
  50%       { box-shadow: 0 0 0 5px rgba(34, 197, 94, 0); }
}

.currency-divider {
  height: 1px;
  background: rgba(215, 226, 234, 0.07);
  margin: 0.3rem 0;
}

.currency-option {
  padding: 0.62rem 0.8rem;
  border-radius: 100px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: 'Kanit', sans-serif;
  color: rgba(215, 226, 234, 0.6);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}

.currency-option:hover {
  background: rgba(182, 0, 168, 0.1);
  color: #D7E2EA;
}

.currency-option.active {
  color: #CF66CA;
  background: rgba(182, 0, 168, 0.12);
}

.currency-option .cur-left {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.currency-flag {
  font-size: 1rem;
  line-height: 1;
}

.cur-name {
  font-weight: 500;
  letter-spacing: 0.04em;
}

.cur-full {
  font-size: 0.68rem;
  font-weight: 300;
  color: rgba(215, 226, 234, 0.35);
  letter-spacing: 0.03em;
}

.currency-option.active .cur-full {
  color: rgba(207, 102, 202, 0.6);
}

.check-icon {
  color: #B600A8;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}

.currency-option.active .check-icon {
  opacity: 1;
}

/* ============================================================
   CONTACT BUTTON
   ============================================================ */
.contact-btn {
  background: linear-gradient(123deg, #18011F 7%, #B600A8 37%, #7621B0 72%, #BE4C00 100%);
  color: white;
  padding: 0.7rem 1.8rem;
  border-radius: 100px;
  font-family: 'Kanit', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-decoration: none;
  border: 2px solid rgba(255, 255, 255, 0.2);
  transition: transform 0.25s, box-shadow 0.25s;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  cursor: pointer;
  outline: none;
  box-shadow: inset 4px 4px 12px #7721B1;
  white-space: nowrap;
}

.contact-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(182, 0, 168, 0.45), inset 4px 4px 12px #7721B1;
}

/* ============================================================
   HERO SECTION
   ============================================================ */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 0 5%;
  position: relative;
  overflow: hidden;
}

.hero-top {
  padding-top: 7rem;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(215, 226, 234, 0.05);
  border: 1px solid rgba(215, 226, 234, 0.14);
  border-radius: 100px;
  padding: 0.42rem 1.1rem;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1.4rem;
  color: #D7E2EA;
}

.pulse-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #B600A8;
  flex-shrink: 0;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(182, 0, 168, 0.6); }
  50%       { box-shadow: 0 0 0 6px rgba(182, 0, 168, 0); }
}

.hero-h1 {
  font-size: clamp(3.2rem, 16vw, 14rem);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 0.88;
  letter-spacing: -0.02em;
  white-space: nowrap;
  width: 100%;
}

.hero-sub-line {
  font-family: 'Kanit', sans-serif;
  font-size: clamp(1.1rem, 3vw, 2.5rem);
  font-weight: 300;
  font-style: italic;
  color: rgba(215, 226, 234, 0.5);
  letter-spacing: 0.04em;
  margin-top: 0.6rem;
  text-transform: uppercase;
}

.hero-bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 2.8rem;
  margin-top: auto;
  padding-top: 2rem;
}

.hero-desc {
  font-size: clamp(0.72rem, 1.2vw, 1rem);
  color: #D7E2EA;
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  line-height: 1.65;
  max-width: 230px;
  opacity: 0.7;
}

.hero-portrait {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 0;
  width: clamp(200px, 30vw, 460px);
  z-index: 10;
  pointer-events: none;
  transition: transform 0.3s ease-out;
}

.hero-portrait img {
  width: 100%;
  display: block;
  filter: drop-shadow(0 0 60px rgba(182, 0, 168, 0.2));
}

.hero-mini-cards {
  display: flex;
  gap: 0.8rem;
  flex-wrap: wrap;
  margin-top: 2.5rem;
}

.mini-card {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  background: rgba(215, 226, 234, 0.04);
  border: 1px solid rgba(215, 226, 234, 0.1);
  border-radius: 14px;
  padding: 0.7rem 1.1rem;
}

.mini-card-icon {
  color: #B600A8;
  display: flex;
}

.mini-card-title {
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #D7E2EA;
}

.mini-card-sub {
  font-size: 0.68rem;
  font-weight: 300;
  color: rgba(215, 226, 234, 0.45);
  letter-spacing: 0.04em;
}

/* ============================================================
   MARQUEE SECTION (ORIGINAL STYLE)
   ============================================================ */
.marquee-section {
  background: #0C0C0C;
  padding: 5rem 0 3rem;
  overflow: hidden;
}

.marquee-row {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
  will-change: transform;
}

.marquee-tile {
  flex-shrink: 0;
  height: clamp(140px, 18vw, 270px);
  border-radius: 18px;
  overflow: hidden;
}

.marquee-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ============================================================
   TOOLS LOGO STRIP (FIXED HIGHLIGHT)
   ============================================================ */
.tools-strip {
  padding: 4rem 5%;
  background: #0C0C0C;
  text-align: center;
}
.tools-h3 {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: rgba(215, 226, 234, 0.3);
  margin-bottom: 2.5rem;
}
.tools-grid {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4rem;
  flex-wrap: wrap;
}
.tool-logo {
  height: 28px;
  opacity: 0.9;
  filter: brightness(0) invert(1); /* Force all logos to be white */
  transition: opacity 0.3s, transform 0.3s;
}
.tool-logo:hover {
  opacity: 1;
  transform: scale(1.15);
}

/* ============================================================
   ABOUT SECTION
   ============================================================ */
.about-section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 7rem 5%;
  position: relative;
  text-align: center;
}

.about-dec {
  position: absolute;
  pointer-events: none;
}

.about-dec img {
  width: 100%;
  display: block;
}

.about-h2 {
  font-size: clamp(3.5rem, 12vw, 11rem);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 0.9;
  letter-spacing: -0.02em;
  margin-bottom: 2.5rem;
}

.about-text {
  font-size: clamp(0.95rem, 1.5vw, 1.25rem);
  color: #D7E2EA;
  font-weight: 300;
  line-height: 1.9;
  max-width: 580px;
  opacity: 0.8;
  margin-bottom: 3rem;
}

.stats-row {
  display: flex;
  gap: 3rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 2.5rem;
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  font-weight: 900;
  line-height: 1;
  display: block;
}

.stat-label {
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.45;
  margin-top: 0.3rem;
  display: block;
}

/* AVAILABILITY CALENDAR */
.availability-card {
  background: rgba(182, 0, 168, 0.05);
  border: 1px solid rgba(182, 0, 168, 0.2);
  border-radius: 20px;
  padding: 1.5rem 2rem;
  margin-bottom: 3rem;
  display: inline-flex;
  align-items: center;
  gap: 1.5rem;
  text-align: left;
}
.cal-icon {
  background: #B600A8;
  color: white;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.cal-text-top {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0.5;
}
.cal-text-main {
  font-size: 1rem;
  font-weight: 600;
  color: #D7E2EA;
}

.skills-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  max-width: 620px;
  margin-bottom: 3rem;
}

.skill-tag {
  background: rgba(215, 226, 234, 0.05);
  border: 1px solid rgba(215, 226, 234, 0.1);
  border-radius: 100px;
  padding: 0.4rem 1.1rem;
  font-size: 0.78rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: #D7E2EA;
  opacity: 0.75;
  transition: all 0.2s;
  cursor: default;
}

.skill-tag:hover {
  background: rgba(182, 0, 168, 0.12);
  border-color: rgba(182, 0, 168, 0.35);
  opacity: 1;
}

/* ============================================================
   PROCESS SECTION
   ============================================================ */
.process-section {
  padding: 8rem 5%;
  background: #0C0C0C;
}
.process-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2rem;
  max-width: 1200px;
  margin: 4rem auto 0;
}
.process-step {
  position: relative;
  padding: 2rem;
  background: rgba(215, 226, 234, 0.03);
  border: 1px solid rgba(215, 226, 234, 0.08);
  border-radius: 24px;
  transition: transform 0.3s, border-color 0.3s;
}
.process-step:hover {
  transform: translateY(-10px);
  border-color: rgba(182, 0, 168, 0.4);
}
.step-num {
  font-size: 3rem;
  font-weight: 900;
  color: rgba(182, 0, 168, 0.2);
  line-height: 1;
  margin-bottom: 1rem;
}
.step-title {
  font-size: 1.2rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.8rem;
}
.step-desc {
  font-size: 0.85rem;
  color: rgba(215, 226, 234, 0.5);
  font-weight: 300;
}

/* ============================================================
   SERVICES SECTION
   ============================================================ */
.services-section {
  background: #FFFFFF;
  border-radius: 50px 50px 0 0;
  padding: 6rem 5% 7rem;
  margin-top: -2rem;
  position: relative;
  z-index: 5;
}

.services-h2 {
  font-size: clamp(3.5rem, 12vw, 11rem);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 0.9;
  letter-spacing: -0.02em;
  color: #0C0C0C;
  text-align: center;
  margin-bottom: 4rem;
}

.currency-note {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  background: rgba(118, 33, 176, 0.06);
  border: 1px solid rgba(118, 33, 176, 0.15);
  border-radius: 12px;
  padding: 0.7rem 1.4rem;
  font-size: 0.75rem;
  font-weight: 400;
  color: rgba(12, 12, 12, 0.5);
  letter-spacing: 0.04em;
  max-width: 480px;
  margin: -2rem auto 3rem;
  text-align: center;
  line-height: 1.5;
}

.currency-note strong {
  color: #7621B0;
  font-weight: 600;
}

.currency-note svg {
  flex-shrink: 0;
  color: #7621B0;
}

.srv-list {
  max-width: 920px;
  margin: 0 auto;
}

.srv-item {
  display: flex;
  align-items: flex-start;
  gap: 2rem;
  padding: 2.5rem 0;
  border-top: 1px solid rgba(12, 12, 12, 0.12);
}

.srv-item:last-child {
  border-bottom: 1px solid rgba(12, 12, 12, 0.12);
}

.srv-num {
  font-size: clamp(3.5rem, 9vw, 8rem);
  font-weight: 900;
  color: #0C0C0C;
  line-height: 1;
  flex-shrink: 0;
  opacity: 0.88;
  min-width: clamp(80px, 12vw, 160px);
}

.srv-content {
  flex: 1;
  padding-top: 1rem;
}

.srv-name {
  font-size: clamp(1.1rem, 2.2vw, 2rem);
  font-weight: 600;
  color: #0C0C0C;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 0.6rem;
}

.srv-desc {
  font-size: clamp(0.85rem, 1.4vw, 1.1rem);
  color: rgba(12, 12, 12, 0.55);
  font-weight: 300;
  line-height: 1.8;
  max-width: 560px;
  margin-bottom: 0.8rem;
}

.srv-price {
  display: inline-block;
  background: rgba(118, 33, 176, 0.08);
  border: 1px solid rgba(118, 33, 176, 0.2);
  border-radius: 100px;
  padding: 0.35rem 1rem;
  font-size: 0.78rem;
  font-weight: 600;
  color: #7621B0;
  letter-spacing: 0.04em;
  transition: background 0.25s, color 0.25s;
  min-width: 100px;
  text-align: center;
}

/* ============================================================
   WORK / PROJECTS SECTION
   ============================================================ */
.work-section {
  background: #0C0C0C;
  border-radius: 50px 50px 0 0;
  margin-top: -2rem;
  padding: 6rem 5% 7rem;
  position: relative;
  z-index: 10;
}

.work-h2 {
  font-size: clamp(3.5rem, 12vw, 11rem);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 0.9;
  letter-spacing: -0.02em;
  text-align: center;
  margin-bottom: 4rem;
}

.work-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.5rem;
  max-width: 1100px;
  margin: 0 auto;
}

.work-card {
  background: #111111;
  border: 1px solid rgba(215, 226, 234, 0.08);
  border-radius: 32px;
  overflow: hidden;
  text-decoration: none;
  color: #D7E2EA;
  transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), border-color 0.3s;
  display: block;

<script>

function buildRow(el, imgs) {
  const tripled = [...imgs, ...imgs, ...imgs];
  tripled.forEach(src => {
    const tile = document.createElement('div');
    tile.className = 'marquee-tile';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    img.alt = '';
    tile.appendChild(img);
    el.appendChild(tile);
  });
}

const row1 = document.getElementById('row1');
const row2 = document.getElementById('row2');
if(row1 && row2) {
  buildRow(row1, GIFS.slice(0, 11));
  buildRow(row2, GIFS.slice(11));
}

const marqueeSect = document.getElementById('marquee-section');
function updateMarquee() {
  if(!marqueeSect) return;
  const sectionTop = marqueeSect.getBoundingClientRect().top + window.scrollY;
  const offset = (window.scrollY - sectionTop + window.innerHeight) * 0.3;
  row1.style.transform = `translateX(${offset - 200}px)`;
  row2.style.transform = `translateX(${-(offset - 200)}px)`;
}
window.addEventListener('scroll', updateMarquee, { passive: true });
updateMarquee();

/* ─── Iframe Scaling ─────────────────────────────────────────── */
function scaleIframes() {
  const containers = document.querySelectorAll('.work-card-iframe-container');
  containers.forEach(container => {
    const iframe = container.querySelector('iframe');
    const containerWidth = container.offsetWidth;
    const baseWidth = 1280;
    const scale = containerWidth / baseWidth;
    iframe.style.width = baseWidth + 'px';
    iframe.style.height = (container.offsetHeight / scale) + 'px';
    iframe.style.transform = `scale(${scale})`;
  });
}

const iframeObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const iframe = entry.target;
      if (iframe.dataset.src) {
        iframe.src = iframe.dataset.src;
        iframe.removeAttribute('data-src');
        iframe.onload = () => {
          iframe.classList.add('loaded');
          scaleIframes();
        };
      }
      iframeObserver.unobserve(iframe);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.work-card-iframe').forEach(iframe => {
  iframeObserver.observe(iframe);
});

window.addEventListener('resize', scaleIframes);
window.addEventListener('load', scaleIframes);

/* ─── Hero Portrait Magnetic ─────────────────────────────────── */
const portrait = document.getElementById('hero-portrait');
document.addEventListener('mousemove', (e) => {
  if (!portrait) return;
  const rect = portrait.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / 8;
  const dy = (e.clientY - cy) / 14;
  const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
  if (dist < 400) {
    portrait.style.transform = `translateX(calc(-50% + ${dx}px)) translateY(${dy}px)`;
    portrait.style.transition = 'transform 0.3s ease-out';
  } else {
    portrait.style.transform = 'translateX(-50%)';
    portrait.style.transition = 'transform 0.6s ease-in-out';
  }
});

/* ─── Scroll Reveal ─────────────────────────────────────────── */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      revealObserver.unobserve(e.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

document.querySelectorAll('.fade-up, .fade-left, .fade-right').forEach(el => {
  revealObserver.observe(el);
});

/* ─── Active Nav ─────────────────────────────────────────────── */
const sections = document.querySelectorAll('section[id], div[id="marquee-section"]');
const navLinks  = document.querySelectorAll('.nav-links a');

const navObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      navLinks.forEach(link => {
        link.style.opacity = link.getAttribute('href') === '#' + entry.target.id ? '1' : '0.65';
      });
    }
  });
}, { threshold: 0.4 });

sections.forEach(s => navObserver.observe(s));

   ════════════════════════════════════════════════════════════ */
const FALLBACK = { USD: 1, CAD: 1.380, INR: 83.50 };
let rates = { ...FALLBACK };

fetch('https://open.er-api.com/v6/latest/USD')
  .then(r => r.json())
  .then(data => {
    if (data && data.result === 'success' && data.rates) {
      rates = { USD: 1, CAD: data.rates.CAD, INR: data.rates.INR };
      document.getElementById('rateBadge').textContent = 'Live';
      applyPrices(activeCurrency.code, activeCurrency.symbol);
    }
  })
  .catch(() => {
    document.getElementById('rateBadge').textContent = 'Est.';
  });

let activeCurrency = { code: 'USD', symbol: '$' };

function formatConverted(usdAmount, code, symbol) {
  const raw = usdAmount * rates[code];
  if (code === 'INR') return `From ${symbol}${Math.round(raw).toLocaleString('en-IN')}`;
  const rounded = raw >= 100 ? Math.round(raw) : raw >= 10 ? Math.round(raw * 10) / 10 : Math.round(raw * 100) / 100;
  return `From ${symbol}${rounded.toLocaleString('en-US')}`;
}

function applyPrices(code, symbol) {
  document.querySelectorAll('.srv-price').forEach(el => {
    const usd = parseFloat(el.dataset.usd);
    el.textContent = formatConverted(usd, code, symbol);
  });
  const noteEl = document.getElementById('noteLabel');
  if (noteEl) noteEl.textContent = code;
}

const currencySel = document.getElementById('currencySel');
const currencyBtn = document.getElementById('currencyBtn');
const currencyLabel = document.getElementById('currencyLabel');
const currencyDropdown = document.getElementById('currencyDropdown');

currencyBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const isOpen = currencySel.classList.toggle('open');
  currencyBtn.setAttribute('aria-expanded', isOpen);
});

document.addEventListener('click', () => {
  currencySel.classList.remove('open');
  currencyBtn.setAttribute('aria-expanded', 'false');
});

currencyDropdown.addEventListener('click', e => e.stopPropagation());

document.querySelectorAll('.currency-option').forEach(opt => {
  opt.addEventListener('click', () => {
    const code = opt.dataset.code;
    const symbol = opt.dataset.symbol;
    document.querySelectorAll('.currency-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    currencyLabel.textContent = `${symbol.trim()} ${code}`;
    currencySel.classList.remove('open');
    currencyBtn.setAttribute('aria-expanded', 'false');
    activeCurrency = { code, symbol };
    applyPrices(code, symbol);
  });
});
</script>
